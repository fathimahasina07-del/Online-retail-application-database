{% extends "base.html" %}
{% block title %}Register – ShopNest{% endblock %}
{% block content %}
<div style="max-width:480px;margin:40px auto">
  <div class="card">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:3rem">🛍️</div>
      <h2 style="font-size:1.6rem;font-weight:700;margin-top:10px">Create Account</h2>
      <p style="color:#999;font-size:0.9rem">Join millions of ShopNest shoppers</p>
    </div>
    <div class="form-group">
      <label>Full Name *</label>
      <input class="form-control" id="name" type="text" placeholder="John Doe"/>
    </div>
    <div class="form-group">
      <label>Email Address *</label>
      <input class="form-control" id="email" type="email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password *</label>
      <input class="form-control" id="password" type="password" placeholder="Min 6 characters"/>
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input class="form-control" id="phone" type="tel" placeholder="+91 98765 43210"/>
    </div>
    <div class="form-group">
      <label>Delivery Address</label>
      <textarea class="form-control" id="address" rows="3" placeholder="Your full address..."></textarea>
    </div>
    <button class="btn btn-primary btn-full" style="font-size:1rem;padding:14px" onclick="doRegister()">
      Create Account →
    </button>
    <div style="text-align:center;margin-top:20px;color:#999;font-size:0.85rem">
      Already have an account?
      <a href="/login" style="color:#FF6B35;font-weight:600;text-decoration:none">Sign In</a>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function doRegister() {
  const name     = document.getElementById('name').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const phone    = document.getElementById('phone').value.trim();
  const address  = document.getElementById('address').value.trim();
  if (!name || !email || !password) return showToast('Name, email, password are required.', 'error');
  if (password.length < 6)          return showToast('Password must be at least 6 characters.', 'error');
  const res  = await fetch('/api/register', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ name, email, password, phone, address })
  });
  const data = await res.json();
  showToast(data.message, data.success ? 'success' : 'error');
  if (data.success) setTimeout(() => window.location.href = '/', 1000);
}
</script>
{% endblock %}
