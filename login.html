{% extends "base.html" %}
{% block title %}Login – ShopNest{% endblock %}
{% block content %}
<div style="max-width:420px;margin:40px auto">
  <div class="card">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:3rem">🔐</div>
      <h2 style="font-size:1.6rem;font-weight:700;margin-top:10px">Welcome Back</h2>
      <p style="color:#999;font-size:0.9rem">Sign in to your ShopNest account</p>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input class="form-control" id="email" type="email" placeholder="you@example.com"
             value="demo@shopnest.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input class="form-control" id="password" type="password" placeholder="Your password"
             value="demo123" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn btn-primary btn-full" style="font-size:1rem;padding:14px" onclick="doLogin()">
      Sign In →
    </button>
    <div style="text-align:center;margin-top:20px;color:#999;font-size:0.85rem">
      Don't have an account?
      <a href="/register" style="color:#FF6B35;font-weight:600;text-decoration:none">Sign Up</a>
    </div>
    <div style="margin-top:20px;padding:14px;background:#fff8f5;border:1px solid #ffe0d0;
                border-radius:8px;font-size:0.82rem;color:#666">
      <strong>Demo credentials pre-filled:</strong><br>
      📧 demo@shopnest.com / 🔑 demo123
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  if (!email || !password) return showToast('Please fill all fields.', 'error');
  const res  = await fetch('/api/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ email, password })
  });
  const data = await res.json();
  showToast(data.message, data.success ? 'success' : 'error');
  if (data.success) setTimeout(() => window.location.href = '/', 1000);
}
</script>
{% endblock %}
